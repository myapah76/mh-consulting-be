services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mh_consulting}
      DB_USERNAME: ${DB_USERNAME:-mh_consulting}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Administrator}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_ENABLE_SSL: ${SMTP_ENABLE_SSL:-true}
      SMTP_IMPLICIT_SSL: ${SMTP_IMPLICIT_SSL:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@mhconsulting.vn}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-MH Consulting}
      CONSULTATION_RECIPIENT_EMAIL: ${CONSULTATION_RECIPIENT_EMAIL:-info@mhconsulting.vn}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  postgres_data:
