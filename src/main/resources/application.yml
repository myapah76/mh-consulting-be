spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: MH-CONSULTING-BE
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mh_consulting}}
    username: ${DB_USERNAME:mh_consulting}
    password: ${DB_PASSWORD:12345}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: false

server:
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 8h
      cookie:
        name: MHCONSULTING_SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:None}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    csrf:
      enabled: true
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.mhconsultingbe
  paths-to-match: /api/**

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  password-reset-url: ${PASSWORD_RESET_URL:${FRONTEND_URL:http://localhost:3000}/admin/reset-password}
  mail:
    credentials-encryption-key: ${EMAIL_CREDENTIALS_ENCRYPTION_KEY:}
    smtp:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      environment-username: ${SMTP_USERNAME:}
      environment-password: ${SMTP_PASSWORD:}
      auth: ${SMTP_AUTH:true}
      start-tls: ${SMTP_ENABLE_SSL:true}
      implicit-ssl: ${SMTP_IMPLICIT_SSL:false}
      connection-timeout: ${SMTP_CONNECTION_TIMEOUT:10000}
      read-timeout: ${SMTP_READ_TIMEOUT:10000}
      write-timeout: ${SMTP_WRITE_TIMEOUT:10000}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    full-name: ${ADMIN_FULL_NAME:Administrator}
