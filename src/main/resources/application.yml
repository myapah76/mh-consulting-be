spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: MH-CONSULTING-BE
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mh_consulting}}
    username: ${DB_USERNAME:mh_consulting}
    password: ${DB_PASSWORD:12345}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_ENABLE_SSL:true}
            required: ${SMTP_ENABLE_SSL:true}
          ssl:
            enable: ${SMTP_IMPLICIT_SSL:false}
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  mvc:
    problemdetails:
      enabled: false

server:
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 8h
      cookie:
        name: MHCONSULTING_SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:None}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    csrf:
      enabled: true
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.mhconsultingbe
  paths-to-match: /api/**

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    full-name: ${ADMIN_FULL_NAME:Administrator}
